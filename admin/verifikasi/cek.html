<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peninjauan Berkas Klaim - LostFound Admin</title>
    <style>
        /* ============================================================
                   RESET & BASE STYLES
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
        }

        input {
            font-family: inherit;
        }

        /* ============================================================
                   SIDEBAR - WARNA #0F172A
                   ============================================================ */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #0F172A;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar .sidebar-header {
            padding: 24px 20px 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar .sidebar-header .logo {
            color: #ffffff;
            font-weight: 700;
            font-size: 18px;
        }

        .sidebar .sidebar-header .logo span {
            font-weight: 300;
            color: #64748b;
        }

        .sidebar .sidebar-header .subtitle {
            font-size: 11px;
            color: #475569;
            margin-top: 2px;
        }

        .sidebar .sidebar-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .sidebar .sidebar-menu .menu-label {
            font-size: 10px;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 12px 12px 8px 12px;
        }

        .sidebar .sidebar-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #94a3b8;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .sidebar .sidebar-menu .menu-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }

        .sidebar .sidebar-menu .menu-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-weight: 500;
        }

        .sidebar .sidebar-menu .menu-item .icon {
            font-size: 17px;
            width: 22px;
            text-align: center;
        }

        .sidebar .sidebar-menu .menu-item .badge {
            margin-left: auto;
            background: #ef4444;
            color: #ffffff;
            font-size: 9px;
            font-weight: 600;
            padding: 1px 8px;
            border-radius: 10px;
        }

        .sidebar .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar .sidebar-footer .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar .sidebar-footer .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a33900, #cc4900);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
        }

        .sidebar .sidebar-footer .user-info .user-details .name {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
        }

        .sidebar .sidebar-footer .user-info .user-details .role {
            font-size: 11px;
            color: #64748b;
        }

        .sidebar .sidebar-footer .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #f87171;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            background: none;
            border: none;
        }

        .sidebar .sidebar-footer .logout-btn:hover {
            background: rgba(248, 113, 113, 0.1);
        }

        /* ============================================================
                   MAIN CONTENT
                   ============================================================ */
        .main-content {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ============================================================
                   TOPBAR
                   ============================================================ */
        .topbar {
            background: #ffffff;
            padding: 14px 28px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }

        .topbar .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar .topbar-right .notification {
            font-size: 18px;
            cursor: pointer;
            position: relative;
        }

        .topbar .topbar-right .notification .dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 7px;
            height: 7px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid #ffffff;
        }

        .topbar .topbar-right .admin-badge {
            background: #a33900;
            color: #ffffff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }

        .topbar .topbar-right .admin-name {
            font-size: 13px;
            font-weight: 500;
            color: #0f172a;
        }

        .topbar .topbar-right .divider {
            width: 1px;
            height: 20px;
            background: #e2e8f0;
        }

        /* ============================================================
                   BREADCRUMB
                   ============================================================ */
        .breadcrumb {
            padding: 14px 28px 0 28px;
            font-size: 13px;
            color: #64748b;
        }
        .breadcrumb a {
            color: #a33900;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .breadcrumb .separator {
            margin: 0 8px;
            color: #94a3b8;
        }
        .breadcrumb .current {
            color: #0f172a;
            font-weight: 500;
        }

        /* ============================================================
                   CONTENT
                   ============================================================ */
        .dashboard-content {
            padding: 20px 28px 32px 28px;
            flex: 1;
        }

        /* ============================================================
                   DETAIL CARD
                   ============================================================ */
        .detail-card {
            background: #ffffff;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 28px 32px;
            max-width: 820px;
            margin: 0 auto;
        }

        .detail-card .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .detail-card .card-subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
        }

        .detail-card .section {
            margin-bottom: 20px;
        }

        .detail-card .section:last-child {
            margin-bottom: 0;
        }

        .detail-card .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .detail-card .section-desc {
            font-size: 13px;
            color: #475569;
            line-height: 1.7;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 3px solid #a33900;
        }

        /* ============================================================
                   SEARCH BAR - "Cari berkas..."
                   ============================================================ */
        .search-berkas {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 8px 14px;
            gap: 10px;
            border: 1px solid #e2e8f0;
            transition: border-color 0.3s ease;
            margin-top: 6px;
        }

        .search-berkas:focus-within {
            border-color: #a33900;
            background: #ffffff;
        }

        .search-berkas .search-icon {
            color: #94a3b8;
            font-size: 14px;
        }

        .search-berkas input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 13px;
            color: #0f172a;
            width: 100%;
            font-family: inherit;
        }

        .search-berkas input::placeholder {
            color: #94a3b8;
        }

        .detail-card .file-list {
            list-style: none;
            padding: 0;
            margin-top: 8px;
        }

        .detail-card .file-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 13px;
            color: #334155;
        }

        .detail-card .file-list li .file-icon {
            font-size: 14px;
            color: #a33900;
        }

        .detail-card .file-list li .file-name {
            font-weight: 500;
        }

        /* ============================================================
                   VERIFICATION SECTION
                   ============================================================ */
        .detail-card .verification-section .verification-label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .detail-card .verification-section textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            outline: none;
            transition: border-color 0.3s ease;
            background: #ffffff;
            color: #0f172a;
        }

        .detail-card .verification-section textarea:focus {
            border-color: #a33900;
        }

        .detail-card .verification-section textarea::placeholder {
            color: #94a3b8;
        }

        .detail-card .decision-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .detail-card .decision-buttons .btn {
            padding: 8px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .detail-card .decision-buttons .btn-success {
            background: #22c55e;
            color: #ffffff;
        }

        .detail-card .decision-buttons .btn-success:hover {
            background: #16a34a;
        }

        .detail-card .decision-buttons .btn-warning {
            background: #f59e0b;
            color: #ffffff;
        }

        .detail-card .decision-buttons .btn-warning:hover {
            background: #d97706;
        }

        .detail-card .decision-buttons .btn-danger {
            background: #ef4444;
            color: #ffffff;
        }

        .detail-card .decision-buttons .btn-danger:hover {
            background: #dc2626;
        }

        .detail-card .decision-buttons .btn-back {
            background: #e2e8f0;
            color: #0f172a;
        }

        .detail-card .decision-buttons .btn-back:hover {
            background: #cbd5e1;
        }

        /* ============================================================
                   REVIEW SECTION
                   ============================================================ */
        .detail-card .review-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: #fef3c7;
            border-radius: 8px;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .detail-card .review-section .review-icon {
            font-size: 18px;
        }

        .detail-card .review-section .review-text {
            font-size: 13px;
            font-weight: 500;
            color: #92400e;
        }

        .detail-card .review-section .review-id {
            font-size: 13px;
            color: #92400e;
            margin-left: auto;
            font-weight: 600;
        }

        /* ============================================================
                   WARNING BOX
                   ============================================================ */
        .detail-card .warning-box {
            background: #fef3c7;
            border-left: 3px solid #f59e0b;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: #92400e;
            margin-top: 8px;
        }

        .detail-card .warning-box .warning-icon {
            margin-right: 8px;
        }

        /* ============================================================
                   RESPONSIVE
                   ============================================================ */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            color: #0f172a;
            font-size: 22px;
            padding: 4px;
        }

        .menu-toggle svg {
            width: 22px;
            height: 22px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 99;
        }

        .sidebar-overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.active {
                display: block;
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .topbar {
                padding: 10px 16px;
            }

            .topbar .page-title {
                font-size: 16px;
            }

            .topbar .topbar-right .admin-name {
                display: none;
            }

            .topbar .topbar-right .divider {
                display: none;
            }

            .breadcrumb {
                padding: 10px 16px 0 16px;
                font-size: 12px;
            }

            .dashboard-content {
                padding: 14px 16px 24px 16px;
            }

            .detail-card {
                padding: 16px 18px;
            }

            .detail-card .card-title {
                font-size: 17px;
            }

            .detail-card .decision-buttons {
                flex-direction: column;
            }

            .detail-card .decision-buttons .btn {
                text-align: center;
                width: 100%;
            }

            .detail-card .review-section {
                flex-wrap: wrap;
            }

            .detail-card .review-section .review-id {
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .topbar .page-title {
                font-size: 14px;
            }

            .topbar .topbar-right .admin-badge {
                font-size: 9px;
                padding: 2px 10px;
            }

            .detail-card .section-desc {
                font-size: 12px;
                padding: 10px 12px;
            }

            .search-berkas input {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- SIDEBAR OVERLAY (Mobile) -->
    <!-- ============================================================ -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- ============================================================ -->
    <!-- SIDEBAR - WARNA #0F172A -->
    <!-- ============================================================ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">LostFound <span>ADMIN</span></div>
            <div class="subtitle">Panel Administrator</div>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-label">MAIN MENU</div>
            <a href="../dashboard/index.html" class="menu-item">
                <span class="icon">📊</span>
                Dashboard
            </a>
            <a href="../verifikasi/index.html" class="menu-item active">
                <span class="icon">✅</span>
                Verifikasi Klaim
                <span class="badge">5</span>
            </a>
            <a href="../laporan/index.html" class="menu-item">
                <span class="icon">📋</span>
                Laporan
                <span class="badge">5</span>
            </a>
            <a href="../arsip/index.html" class="menu-item">
                <span class="icon">📄</span>
                Arsip
            </a>

            <div class="menu-label" style="margin-top:16px;">SETTINGS</div>
            <a href="../pengguna/index.html" class="menu-item">
                <span class="icon">👥</span>
                Manajemen User
            </a>
            <a href="../pengaturan/index.html" class="menu-item">
                <span class="icon">⚙️</span>
                Konfigurasi Sistem
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar">SA</div>
                <div class="user-details">
                    <div class="name">Super Admin</div>
                    <div class="role">Petugas Posko</div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                🚪 Keluar Sesi
            </button>
        </div>
    </aside>

    <!-- ============================================================ -->
    <!-- MAIN CONTENT -->
    <!-- ============================================================ -->
    <main class="main-content">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="page-title">Peninjauan Berkas Klaim</h1>
            </div>
            <div class="topbar-right">
                <span class="notification">
                    🔔
                    <span class="dot"></span>
                </span>
                <span class="divider"></span>
                <span class="admin-badge">Admin</span>
                <span class="admin-name">Petugas</span>
            </div>
        </header>

        <!-- BREADCRUMB -->
        <nav class="breadcrumb">
            <a href="../verifikasi/index.html">Verifikasi</a>
            <span class="separator">›</span>
            <span class="current">Peninjauan Berkas Klaim</span>
        </nav>

        <!-- CONTENT -->
        <div class="dashboard-content">

            <div class="detail-card" id="detailCard">
                <!-- diisi JavaScript -->
            </div>

        </div>
    </main>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // SIDEBAR TOGGLE (Mobile)
            // ============================================================
            var sidebar = document.getElementById('sidebar');
            var sidebarOverlay = document.getElementById('sidebarOverlay');
            var menuToggle = document.getElementById('menuToggle');

            window.toggleSidebar = function() {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('active');
            };

            if (menuToggle) {
                menuToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleSidebar();
                });
            }

            if (sidebarOverlay) {
                sidebarOverlay.addEventListener('click', function() {
                    toggleSidebar();
                });
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && sidebar.classList.contains('open')) {
                    toggleSidebar();
                }
            });

            // ============================================================
            // LOGOUT
            // ============================================================
            window.logout = function() {
                if (confirm('Apakah Anda yakin ingin keluar?')) {
                    localStorage.removeItem('isAdminLoggedIn');
                    localStorage.removeItem('adminEmail');
                    localStorage.removeItem('adminRememberMe');
                    window.location.href = '../auth/login.html';
                }
            };

            // ============================================================
            // DATA
            // ============================================================
            var claimData = [
                { id: 'ACLM-98231', claimant: 'Ahmad Dahlan',
                    desc: '"Terdapat gantungan kunci berbentuk kura-kura warna biru di resalting bagian dalam tas sebelah kanan. Di dalam kantung rahasianya juga ada foto keluarga ukuran kecil yang sudah agak luntur."',
                    files: ['KTM_AHMAD_DAHLAN_JPG', 'NOTA_PEMBELIAN_JPG', 'FOTO_BARANG_JPG'],
                    warning: 'Berkas Nota Pembelian terdeteksi memiliki kualitas gambar rendah (Low Res).',
                    reviewId: '01-09-2021' },
                { id: 'ACLM-98235', claimant: 'Siti Aminah',
                    desc: '"iPhone 13 Pro Max warna biru dengan casing transparan. Ada stiker di bagian belakang."',
                    files: ['KTM_SITI_AMINAH_JPG', 'FOTO_BARANG_JPG'],
                    warning: '', reviewId: '02-09-2021' },
                { id: 'ACLM-98240', claimant: 'Rizky Febrian',
                    desc: '"Kunci mobil Honda dengan gantungan kunci berbentuk mobil."',
                    files: ['KTM_RIZKY_FEBRIAN_JPG', 'FOTO_KUNCI_JPG'],
                    warning: '', reviewId: '03-09-2021' },
            ];

            // ============================================================
            // GET ID FROM URL
            // ============================================================
            function getQueryParam(param) {
                var urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }

            var claimId = getQueryParam('id');

            var item = null;
            for (var i = 0; i < claimData.length; i++) {
                if (claimData[i].id === claimId) {
                    item = claimData[i];
                    break;
                }
            }

            // ============================================================
            // RENDER DETAIL
            // ============================================================
            function renderDetail() {
                var card = document.getElementById('detailCard');

                if (!item) {
                    card.innerHTML = `
                        <div style="text-align:center; padding:40px;">
                            <p style="color:#64748b; font-size:16px;">❌ Klaim tidak ditemukan.</p>
                            <a href="../verifikasi/index.html" style="color:#a33900; font-weight:600; margin-top:12px; display:inline-block;">Kembali ke Verifikasi</a>
                        </div>
                    `;
                    return;
                }

                // Build file list
                var filesHtml = '';
                for (var i = 0; i < item.files.length; i++) {
                    filesHtml += `
                        <li>
                            <span class="file-icon">📎</span>
                            <span class="file-name">${item.files[i]}</span>
                        </li>
                    `;
                }

                // Warning box
                var warningHtml = '';
                if (item.warning) {
                    warningHtml = `
                        <div class="warning-box">
                            <span class="warning-icon">⚠️</span>
                            ${item.warning}
                        </div>
                    `;
                }

                card.innerHTML = `
                    <!-- 1. JUDUL -->
                    <div class="card-title">Peninjauan Berkas Klaim</div>
                    
                    <!-- 2. SUBTITLE -->
                    <div class="card-subtitle">${item.claimant} (${item.id})</div>

                    <!-- 3. PEMERIKSAAN BUKTI MENDALAM -->
                    <div class="section">
                        <div class="section-title">Pemeriksaan Bukti Mendalam</div>
                        <p style="font-size:13px; color:#64748b;">Periksa bukti di bawah ini sebelum mengambil tindakan. Kekuatan verifikasi menentukan integritas sistem pemeriksaan barang.</p>
                    </div>

                    <!-- 4. SEARCH BAR "Cari berkas..." -->
                    <div class="search-berkas">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchBerkas" placeholder="Cari berkas..." oninput="filterFiles()" />
                    </div>

                    <!-- 5. LAMPIRAN BUKTI -->
                    <div class="section" style="margin-top:12px;">
                        <ul class="file-list" id="fileList">
                            ${filesHtml}
                        </ul>
                    </div>

                    <!-- 6. DESKRIPSI RAHASIA PENGGUNA -->
                    <div class="section">
                        <div class="section-title">Deskripsi Rahasia Pengguna</div>
                        <div class="section-desc">${item.desc}</div>
                    </div>

                    <!-- 7. KEKUATAN VERIFIKASI / KEPUTUSAN PETUGAS -->
                    <div class="section">
                        <div class="section-title">Keputusan Petugas</div>
                        <div class="verification-section">
                            <div class="verification-label">Ketik jawaban jika menolak atau meminta klarifikasi...</div>
                            <textarea id="verificationNote" placeholder="Tulis catatan verifikasi di sini..."></textarea>

                            <div class="decision-buttons">
                                <button class="btn btn-success" onclick="approveClaim('${item.id}')">✅ Setujui Klaim</button>
                                <button class="btn btn-warning" onclick="clarifyClaim('${item.id}')">❓ Minta Klarifikasi</button>
                                <button class="btn btn-danger" onclick="rejectClaim('${item.id}')">❌ Tolak Klaim</button>
                                <a href="../verifikasi/index.html" class="btn btn-back">← Kembali</a>
                            </div>
                        </div>
                    </div>

                    <!-- 8. IN REVIEW -->
                    <div class="review-section">
                        <span class="review-icon">⏳</span>
                        <span class="review-text">IN REVIEW</span>
                        <span class="review-id">${item.reviewId}</span>
                    </div>

                    <!-- 9. WARNING -->
                    ${warningHtml}
                `;
            }

            // ============================================================
            // FILTER FILES (Search Berkas)
            // ============================================================
            window.filterFiles = function() {
                var keyword = document.getElementById('searchBerkas').value.toLowerCase().trim();
                var items = document.querySelectorAll('#fileList li');
                for (var i = 0; i < items.length; i++) {
                    var text = items[i].textContent.toLowerCase();
                    if (keyword === '' || text.includes(keyword)) {
                        items[i].style.display = 'flex';
                    } else {
                        items[i].style.display = 'none';
                    }
                }
            };

            // ============================================================
            // APPROVE / CLARIFY / REJECT
            // ============================================================
            window.approveClaim = function(id) {
                var note = document.getElementById('verificationNote');
                var noteText = note ? note.value : 'Tidak ada catatan.';
                alert('✅ Klaim ' + id + ' telah disetujui.\nCatatan: ' + noteText);
                window.location.href = '../verifikasi/index.html';
            };

            window.clarifyClaim = function(id) {
                var note = document.getElementById('verificationNote');
                var noteText = note ? note.value : 'Tidak ada catatan.';
                alert('❓ Klaim ' + id + ' membutuhkan klarifikasi.\nCatatan: ' + noteText);
                window.location.href = '../verifikasi/index.html';
            };

            window.rejectClaim = function(id) {
                var note = document.getElementById('verificationNote');
                var noteText = note ? note.value : 'Tidak ada catatan.';
                alert('❌ Klaim ' + id + ' telah ditolak.\nCatatan: ' + noteText);
                window.location.href = '../verifikasi/index.html';
            };

            // ============================================================
            // INIT
            // ============================================================
            renderDetail();

            console.log('✅ Peninjauan Berkas Klaim loaded successfully!');

        })();
    </script>

</body>
</html>
