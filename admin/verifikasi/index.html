<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifikasi Klaim - LostFound Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================================
                   RESET & BASE STYLES
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F8FAFC; /* Latar belakang abu-abu sangat muda sesuai Figma */
            min-height: 100vh;
            display: flex;
            color: #1E293B;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
        }

        input {
            font-family: inherit;
        }
        

        /* ============================================================
                   MAIN CONTENT AREA
                   ============================================================ */
        .main-content {
            margin-left: 260px;
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 32px 40px;
            gap: 24px;
        }

        /* Topbar Header */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0F172A;
            margin-bottom: 4px;
        }

        .header-title p {
            font-size: 13px;
            color: #64748B;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Search Bar Kapsul Lonjong */
        .search-box {
            position: relative;
            width: 320px;
        }

        .search-box svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #94A3B8;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid #E2E8F0;
            border-radius: 20px;
            font-size: 13px;
            background: #FFFFFF;
            outline: none;
            color: #334155;
        }

        /* Profile Kanan Atas Placeholder CSS murni */
        .top-profile-box {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .top-avatar-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #CBD5E1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-avatar-placeholder svg {
            width: 18px;
            height: 18px;
            color: #475569;
        }

        .dropdown-arrow {
            font-size: 10px;
            color: #64748B;
        }

        /* ============================================================
                   TABS NAVIGATION (GARIS BAWAH SEPERTI FIGMA)
                   ============================================================ */
        .tabs-navigation {
            display: flex;
            gap: 32px;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 1px;
        }

        .tab-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 4px;
            font-size: 14px;
            font-weight: 500;
            color: #64748B;
            cursor: pointer;
            position: relative;
        }

        .tab-item svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .tab-item .count-badge {
            font-size: 11px;
            background: #F1F5F9;
            color: #64748B;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        /* Active Tab (Perlu Ditinjau) dengan garis bawah oranye */
        .tab-item.active {
            color: #E15B17;
            font-weight: 600;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #E15B17;
        }

        .tab-item.active .count-badge {
            background: #FFEDD5;
            color: #E15B17;
        }

        /* ============================================================
                   TABLE CARD CONTAINER
                   ============================================================ */
        .data-card {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01);
            overflow: hidden;
        }

        .main-table {
            width: 100%;
            border-collapse: collapse;
        }

        .main-table th {
            background: #FFFFFF;
            padding: 18px 24px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: #64748B;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #E2E8F0;
        }

        .main-table td {
            padding: 16px 24px;
            border-bottom: 1px solid #F1F5F9;
            font-size: 13px;
            color: #334155;
            vertical-align: middle;
        }

        .main-table tr:last-child td {
            border-bottom: none;
        }

        .col-id {
            color: #64748B;
            font-weight: 500;
        }

        /* Boks Ikon Pengganti Gambar Produk */
        .barang-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-container {
            width: 40px;
            height: 40px;
            background: #F1F5F9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-container svg {
            width: 20px;
            height: 20px;
        }

        .barang-title {
            font-weight: 600;
            color: #0F172A;
        }

        /* Badge Status PENDING Krem Bulat */
        .badge-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #FEF3C7;
            color: #D97706;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            letter-spacing: 0.5px;
        }

        .badge-status::before {
            content: '•';
            font-size: 14px;
            margin-right: 2px;
        }

        /* Tombol Periksa Berkas Gelap */
        .btn-check {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0F172A;
            color: #FFFFFF;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-check:hover {
            background: #1E293B;
        }

        .btn-check svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* ============================================================
                   PAGINATION
                   ============================================================ */
        .table-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-top: 1px solid #E2E8F0;
        }

        .showing-text {
            font-size: 11px;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pagination-buttons {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            background: #FFFFFF;
            font-size: 12px;
            font-weight: 500;
            color: #64748B;
            cursor: pointer;
        }

        .nav-btn:hover:not(:disabled) {
            background: #F8FAFC;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .page-indicator {
            width: 28px;
            height: 28px;
            background: #0F172A;
            color: #FFFFFF;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        /* Mobile Responsive */
        .menu-toggle {
            display: none;
            color: #FFFFFF;
            font-size: 22px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 99;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); margin: 0; padding: 24px 0; border-radius: 0; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .main-content { margin-left: 0; padding: 20px; }
            .menu-toggle { display: block; margin-right: 12px; color: #0F172A; }
            .content-header { flex-direction: column; align-items: flex-start; gap: 16px; }
            .search-box { width: 100%; }
            .header-actions { width: 100%; justify-content: space-between; }
        }
    </style>
    <link rel="stylesheet" href="../../assets/css/admin_sidebar.css">
</head>
<body>

    <div id="app-sidebar"></div>

    <main class="main-content">
        
        <header class="content-header">
            <div style="display: flex; align-items: center;">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="header-title">
                    <h1>Manajemen Klaim</h1>
                    <p>Kelola verifikasi berkas dan pantau pengambilan barang.</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" placeholder="Cari Nama atau ID Klaim..." oninput="searchData()" />
                </div>
                <div class="top-profile-box" onclick="showNotification()">
                    <div class="top-avatar-placeholder">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <span class="dropdown-arrow">▼</span>
                </div>
            </div>
        </header>

        <nav class="tabs-navigation">
            <div class="tab-item active" id="tab-pending" onclick="filterTab('pending')">
                <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Perlu Ditinjau
                <span class="count-badge" id="countPending">3</span>
            </div>
            <div class="tab-item" id="tab-clarification" onclick="filterTab('clarification')">
                <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Butuh Klarifikasi
                <span class="count-badge" id="countClarification">1</span>
            </div>
            <div class="tab-item" id="tab-ready" onclick="filterTab('ready')">
                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                Siap Diambil
                <span class="count-badge" id="countReady">2</span>
            </div>
        </nav>

        <div class="data-card">
            <table class="main-table">
                <thead>
                    <tr>
                        <th style="width: 15%;">ID KLAIM</th>
                        <th style="width: 35%;">NAMA BARANG</th>
                        <th style="width: 20%;">NAMA PENGKLAIM</th>
                        <th style="width: 15%;">TGL UPDATE</th>
                        <th style="width: 15%;">STATUS</th>
                        <th style="text-align: right; width: 15px;">TINDAKAN</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="table-footer">
                <div class="showing-text">
                    SHOWING <span id="startEntry">1</span>-<span id="endEntry">3</span> OF <span id="totalEntries">3</span> ENTRIES
                </div>
                <div class="pagination-buttons">
                    <button class="nav-btn" id="prevPage">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
                        Prev
                    </button>
                    <div class="page-indicator" id="pageNumber">1</div>
                    <button class="nav-btn" id="nextPage">
                        Next
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        (function() {
            'use strict';

            var sidebar = document.getElementById('sidebar');
            var sidebarOverlay = document.getElementById('sidebarOverlay');
            var menuToggle = document.getElementById('menuToggle');

            window.toggleSidebar = function() {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('active');
            };

            if (menuToggle) {
                menuToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleSidebar();
                });
            }

            window.logout = function() {
                if (confirm('Apakah Anda yakin ingin keluar?')) {
                    localStorage.removeItem('isAdminLoggedIn');
                    window.location.href = '../auth/login.html';
                }
            };

            window.showNotification = function() {
                alert('📬 Tidak ada notifikasi baru.');
            };

            
            var claimData = [];

            window.fetchClaims = async function() {
                try {
                    const result = await apiFetch('/claims');
                    if (result.response.ok) {
                        let data = [];
                        if (Array.isArray(result.data)) data = result.data;
                        else if (result.data && Array.isArray(result.data.data)) data = result.data.data;
                        else if (result.data && result.data.data && Array.isArray(result.data.data.data)) data = result.data.data.data;
                        
                        claimData = data.map(c => {
                            let statusTab = 'pending';
                            if (c.status_verif === 'clarification') statusTab = 'clarification';
                            else if (c.status_verif === 'approved') statusTab = 'ready';
                            else if (c.status_verif === 'pending' || c.status_verif === 'reviewed') statusTab = 'pending';
                            else statusTab = c.status_verif;

                            return {
                                id: c.id,
                                item: c.item ? c.item.judul : 'Barang',
                                claimant: c.user ? c.user.nama_lengkap : 'Anonim',
                                date: new Date(c.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'}),
                                status: statusTab
                            };
                        }).filter(item => ['pending', 'clarification', 'ready'].includes(item.status));

                        searchData();
                    }
                } catch (error) {
                    console.error('Gagal mengambil data:', error);
                }
            };

            fetchClaims();


            var currentTab = 'pending';
            var filteredData = claimData.filter(function(i) { return i.status === currentTab; });
            var currentPage = 1;
            var rowsPerPage = 3;

            function updateStats() {
                var pending = claimData.filter(function(item) { return item.status === 'pending'; }).length;
                var clarification = claimData.filter(function(item) { return item.status === 'clarification'; }).length;
                var ready = claimData.filter(function(item) { return item.status === 'ready'; }).length;
                document.getElementById('countPending').textContent = pending;
                document.getElementById('countClarification').textContent = clarification;
                document.getElementById('countReady').textContent = ready;
            }

            function renderTable() {
                var start = (currentPage - 1) * rowsPerPage;
                var end = Math.min(start + rowsPerPage, filteredData.length);
                var pageItems = filteredData.slice(start, end);

                var tbody = document.getElementById('tableBody');
                var html = '';
                
                for (var i = 0; i < pageItems.length; i++) {
                    var item = pageItems[i];
                    
                    var iconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2"><path d="M19 5H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2z"/><path d="M16 11h4v2h-4z"/></svg>`; 
                    var bgColor = '#F1F5F9';

                    if(item.item.toLowerCase().includes('iphone') || item.item.toLowerCase().includes('hp')) {
                        iconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#1E4A8A" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><path d="M12 18h.01"/></svg>`;
                        bgColor = '#EFF6FF';
                    } else if(item.item.toLowerCase().includes('kunci')) {
                        iconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2"><circle cx="7.5" cy="15.5" r="4.5"/><path d="M21 3l-6 6M17 5l2 2M14 8l2 2"/></svg>`;
                        bgColor = '#F0FDF4';
                    }

                    html += `
                        <tr>
                            <td class="col-id">#CLM-${item.id}</td>
                            <td>
                                <div class="barang-wrapper">
                                    <div class="icon-container" style="background-color: ${bgColor};">
                                        ${iconSvg}
                                    </div>
                                    <span class="barang-title">${item.item}</span>
                                </div>
                            </td>
                            <td>${item.claimant}</td>
                            <td>${item.date}</td>
                            <td><span class="badge-status">${item.status.toUpperCase()}</span></td>
                            <td style="text-align: right;">
                                <a href="cek.html?id=${item.id}" class="btn-check">
                                    <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                    Periksa Berkas
                                </a>
                            </td>
                        </tr>
                    `;
                }
                tbody.innerHTML = html;

                var total = filteredData.length;
                var totalPages = Math.ceil(total / rowsPerPage) || 1;
                
                document.getElementById('startEntry').textContent = total === 0 ? 0 : start + 1;
                document.getElementById('endEntry').textContent = total === 0 ? 0 : end;
                document.getElementById('totalEntries').textContent = total;
                document.getElementById('pageNumber').textContent = currentPage;

                document.getElementById('prevPage').disabled = (currentPage === 1);
                document.getElementById('nextPage').disabled = (currentPage === totalPages);

                updateStats();
            }

            
            window.filterTab = function(status) {
                currentTab = status;
                document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
                document.getElementById('tab-' + status).classList.add('active');
                searchData();
            };

            window.searchData = function() {
                var searchInput = document.getElementById('searchInput');
                var keyword = searchInput ? searchInput.value.toLowerCase().trim() : '';
                filteredData = claimData.filter(function(item) {
                    var matchesTab = (item.status === currentTab);
                    var matchesSearch = keyword === '' || 
                        item.id.toLowerCase().includes(keyword) ||
                        item.item.toLowerCase().includes(keyword) ||
                        item.claimant.toLowerCase().includes(keyword);
                    return matchesTab && matchesSearch;
                });
                currentPage = 1;
                renderTable();
            };


            document.getElementById('prevPage').addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            });

            document.getElementById('nextPage').addEventListener('click', function() {
                var totalPages = Math.ceil(filteredData.length / rowsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            });

            renderTable();
        })();
    </script>

    <!-- Injected Base Scripts -->
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/components.js"></script>
</body>
</html>
