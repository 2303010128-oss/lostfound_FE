<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifikasi Klaim - LostFound Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================================
                   RESET & BASE STYLES
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #F8FAFC;
            min-height: 100vh;
            display: flex;
            color: #1E293B;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; font-family: inherit; border: none; outline: none; background: none; }
        
        .main {
            margin-left: 260px;
            flex-direction: column;
            align-items: flex-start;
            flex: 1;
            flex-grow: 1;
            z-index: 0;
            position: relative;
            display: flex;
            align-self: stretch;
            min-height: 100vh;
            background-color: #f8fafc;
        }

        .header {
            align-items: center;
            padding: 16px 32px;
            z-index: 1;
            background-color: #ffffffcc;
            border-bottom-width: 1px;
            border-bottom-style: solid;
            border-color: #e2e8f0;
            backdrop-filter: blur(6px) brightness(100%);
            -webkit-backdrop-filter: blur(6px) brightness(100%);
            display: flex;
            position: relative;
            align-self: stretch;
            width: 100%;
            flex: 0 0 auto;
        }

        .div-4 { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 4px; position: relative; flex: 0 0 auto; }
        .text-wrapper-10 { font-weight: 700; color: #0f172a; font-size: 20px; line-height: 28px; position: relative; display: flex; align-items: center; width: fit-content; margin-top: -1px; white-space: nowrap; font-family: 'Plus Jakarta Sans', sans-serif; }
        .text-wrapper-8 { font-weight: 400; color: #64748b; font-size: 12px; line-height: 16px; position: relative; display: flex; align-items: center; width: fit-content; margin-top: -1px; white-space: nowrap; }

        .div-5 { display: flex; flex-direction: column; align-items: flex-start; gap: 32px; padding: 32px; position: relative; align-self: stretch; width: 100%; flex: 0 0 auto; z-index: 0; }

        .horizontal-border {
            display: flex; align-items: center; gap: 32px; padding: 0px 8px; position: relative; align-self: stretch; width: 100%; flex: 0 0 auto; border-bottom-width: 1px; border-bottom-style: solid; border-color: #e2e8f0;
        }

        .tab-button {
            display: inline-flex; padding: 0px 0px 16px; align-items: center; gap: 8px; position: relative; flex: 0 0 auto; border-bottom: 2px solid transparent; cursor: pointer; transition: 0.2s;
        }
        .tab-button.active { border-bottom-color: #ea580c; }
        .tab-button.active .tab-title { color: #ea580c; }
        .tab-button.active .tab-badge-wrapper { background-color: #fff7ed; color: #ea580c; }

        .tab-title {
            position: relative; display: flex; align-items: center; justify-content: center; width: fit-content; font-weight: 700; color: #94a3b8; font-size: 14px; text-align: center; line-height: 20px; white-space: nowrap; transition: 0.2s;
        }
        .tab-badge-wrapper {
            display: inline-flex; flex-direction: column; align-items: center; padding: 2px 8px; position: relative; flex: 0 0 auto; background-color: #f1f5f9; border-radius: 9999px; color: #94a3b8; transition: 0.2s;
        }
        .tab-badge {
            justify-content: center; text-align: center; line-height: 20px; position: relative; display: flex; align-items: center; width: fit-content; margin-top: -1px; font-weight: 700; font-size: 10px; white-space: nowrap;
        }

        .background-border-2 {
            display: flex; flex-direction: column; align-items: flex-start; position: relative; align-self: stretch; width: 100%; flex: 0 0 auto; background-color: #ffffff; border-radius: 32px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0px 1px 2px #0000000d;
        }

        .table { display: flex; flex-direction: column; align-items: flex-start; position: relative; align-self: stretch; width: 100%; flex: 0 0 auto; overflow-x: auto; }
        .table::-webkit-scrollbar { display: none; }
        
        .header-row {
            align-items: flex-start; justify-content: space-between; background-color: #f8fafc80; border-bottom: 1px solid #f1f5f9; display: flex; position: relative; align-self: stretch; width: 100%; flex: 0 0 auto;
        }
        .cell { display: flex; flex-direction: column; padding: 20px 24px; position: relative; flex: 1; min-width: 120px; }
        .cell.action { align-items: flex-end; }
        .text-wrapper-15 { position: relative; display: flex; align-items: center; width: fit-content; margin-top: -1px; font-weight: 700; color: #94a3b8; font-size: 10px; letter-spacing: 2px; line-height: normal; white-space: nowrap; }

        .body { display: flex; flex-direction: column; align-items: flex-start; position: relative; align-self: stretch; width: 100%; flex: 0 0 auto; margin-top: -1px; }
        .row { display: flex; align-items: center; justify-content: space-between; position: relative; align-self: stretch; width: 100%; flex: 0 0 auto; border-bottom: 1px solid #f8fafc; transition: 0.1s; }
        .row:hover { background-color: #f8fafc80; }
        
        .data { display: flex; flex-direction: column; padding: 24px; position: relative; flex: 1; min-width: 120px; }
        .data.action { align-items: flex-end; }
        
        .text-wrapper-16 { font-size: 12px; font-weight: 700; color: #94a3b8; line-height: 16px; white-space: nowrap; }
        .text-wrapper-17 { font-weight: 700; color: #0f172a; font-size: 14px; line-height: 20px; white-space: nowrap; margin-bottom: 4px; }
        .text-wrapper-19 { font-weight: 500; color: #475569; font-size: 14px; line-height: 20px; white-space: nowrap; }
        .text-wrapper-20 { font-weight: 400; color: #64748b; font-size: 12px; line-height: 16px; margin-bottom: 6px; }

        .icon-container-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin-right: 12px; flex-shrink: 0; }
        .item-info { display: flex; align-items: center; }

        .background-border-3 { display: inline-flex; align-items: center; padding: 2px 8px; background-color: #f1f5f9; border-radius: 4px; border: 1px solid #e2e8f0; }
        .text-wrapper-21 { font-weight: 700; color: #475569; font-size: 9px; letter-spacing: 0.5px; }

        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 9999px; border: 1px solid; }
        .status-badge.approved { background-color: #ecfdf5; border-color: #d1fae5; color: #047857; }
        .status-badge.pending { background-color: #fff7ed; border-color: #ffedd5; color: #ea580c; }
        .status-badge.clarify { background-color: #eff6ff; border-color: #dbeafe; color: #2563eb; }
        .status-badge.rejected { background-color: #fef2f2; border-color: #fee2e2; color: #e11d48; }

        .status-text { font-weight: 700; font-size: 10px; letter-spacing: 0.5px; }

        .link-3 { display: inline-flex; gap: 8px; padding: 8px 16px; align-items: center; position: relative; border-radius: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; overflow: hidden; }
        .link-3.primary { background-color: #ea580c; box-shadow: 0px 4px 6px -4px #ea580c33, 0px 10px 15px -3px #ea580c33; color: #ffffff; }
        .link-3.primary:hover { background-color: #c2410c; }
        .link-3.secondary { background-color: #ffffff; border-color: #e2e8f0; color: #0f172a; }
        .link-3.secondary:hover { background-color: #f8fafc; }
        
        .text-wrapper-22 { font-weight: 700; font-size: 12px; line-height: 16px; white-space: nowrap; }

        .overlay { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; background-color: #f8fafc80; border-top: 1px solid #f1f5f9; }
        .showing-of { font-size: 12px; color: #94a3b8; letter-spacing: 1.2px; }
        .showing-of span.bold { font-weight: 700; color: #0f172a; }
        
        .pagination-controls { display: flex; gap: 8px; }
        .page-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: #ffffff; font-size: 12px; font-weight: 600; color: #334155; transition: 0.2s; }
        .page-btn:hover:not(:disabled) { background: #f1f5f9; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
    <link rel="stylesheet" href="../../assets/css/admin_sidebar.css">
    <link rel="stylesheet" href="../../assets/css/admin_header.css">
</head>
<body>

    
    <!-- SIDEBAR -->
    <div id="app-sidebar"></div>

    <div class="main">
        <header class="header">
            <div class="div-4">
                <div class="text-wrapper-10">Manajemen Klaim</div>
                <div class="text-wrapper-8">Kelola verifikasi berkas dan pantau pengambilan barang.</div>
            </div>
        </header>

        <div class="div-5">
            <div class="horizontal-border">
                <div class="tab-button active" onclick="setTab('pending')" id="tab-pending">
                    <div class="tab-title">Perlu Ditinjau</div>
                    <div class="tab-badge-wrapper"><div class="tab-badge" id="countPending">0</div></div>
                </div>
                <div class="tab-button" onclick="setTab('clarification_required')" id="tab-clarification_required">
                    <div class="tab-title">Butuh Klarifikasi</div>
                    <div class="tab-badge-wrapper"><div class="tab-badge" id="countClarify">0</div></div>
                </div>
                <div class="tab-button" onclick="setTab('approved')" id="tab-approved">
                    <div class="tab-title">Siap Diambil</div>
                    <div class="tab-badge-wrapper"><div class="tab-badge" id="countApproved">0</div></div>
                </div>
            </div>

            <div class="background-border-2">
                <div class="table">
                    <div class="header-row">
                        <div class="cell" style="flex: 0.8"><div class="text-wrapper-15">ID KLAIM</div></div>
                        <div class="cell" style="flex: 2"><div class="text-wrapper-15">NAMA BARANG</div></div>
                        <div class="cell" style="flex: 1.5"><div class="text-wrapper-15">NAMA PENGKLAIM</div></div>
                        <div class="cell" style="flex: 1.2"><div class="text-wrapper-15">TGL UPDATE</div></div>
                        <div class="cell" style="flex: 1.2"><div class="text-wrapper-15">STATUS</div></div>
                        <div class="cell action" style="flex: 1.2"><div class="text-wrapper-15">TINDAKAN</div></div>
                    </div>
                    <div class="body" id="tableBody">
                        <!-- Data rows here -->
                        <div style="padding:40px; text-align:center; color:#64748B;">Memuat data...</div>
                    </div>
                </div>
                <div class="overlay">
                    <p class="showing-of">SHOWING <span class="bold" id="startEntry">0</span>-<span class="bold" id="endEntry">0</span> OF <span class="bold" id="totalEntries">0</span> ENTRIES</p>
                    <div class="pagination-controls">
                        <button class="page-btn" id="btnPrev" onclick="prevPage()">Prev</button>
                        <button class="page-btn" id="btnNext" onclick="nextPage()">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Injected Base Scripts -->
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/components.js"></script>

    <script>
        (function() {
            'use strict';

            var sidebar = document.getElementById('sidebar');
            var sidebarOverlay = document.getElementById('sidebarOverlay');
            var menuToggle = document.getElementById('menuToggle');

            window.toggleSidebar = function() {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('active');
            };

            if (menuToggle) {
                menuToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleSidebar();
                });
            }

            window.logout = function() {
                if (confirm('Apakah Anda yakin ingin keluar?')) {
                    localStorage.removeItem('isAdminLoggedIn');
                    window.location.href = '../auth/login.html';
                }
            };

            window.showNotification = function() {
                alert('📬 Tidak ada notifikasi baru.');
            };

            
            var claimData = [];

            window.fetchClaims = async function() {
                try {
                    const result = await apiFetch('/claims');
                    if (result.response.ok) {
                        let data = [];
                        if (Array.isArray(result.data)) data = result.data;
                        else if (result.data && Array.isArray(result.data.data)) data = result.data.data;
                        else if (result.data && result.data.data && Array.isArray(result.data.data.data)) data = result.data.data.data;
                        
                        claimData = data.map(c => {
                            let statusTab = 'pending';
                            if (c.status_verif === 'clarification_required') statusTab = 'clarification';
                            else if (c.status_verif === 'approved') statusTab = 'ready';
                            else if (c.status_verif === 'pending' || c.status_verif === 'reviewed') statusTab = 'pending';
                            else statusTab = c.status_verif;

                            return {
                                id: c.id,
                                item: c.item ? c.item.judul : 'Barang',
                                claimant: c.user ? c.user.nama_lengkap : 'Anonim',
                                date: new Date(c.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'}),
                                status: statusTab
                            };
                        }).filter(item => ['pending', 'clarification', 'ready'].includes(item.status));

                        searchData();
                    }
                } catch (error) {
                    console.error('Gagal mengambil data:', error);
                }
            };

            fetchClaims();


            var currentTab = 'pending';
            var filteredData = claimData.filter(function(i) { return i.status === currentTab; });
            var currentPage = 1;
            var rowsPerPage = 5;

            function updateStats() {
                var pending = claimData.filter(function(item) { return item.status === 'pending'; }).length;
                var clarification = claimData.filter(function(item) { return item.status === 'clarification'; }).length;
                var ready = claimData.filter(function(item) { return item.status === 'ready'; }).length;
                document.getElementById('countPending').textContent = pending;
                document.getElementById('countClarification').textContent = clarification;
                document.getElementById('countReady').textContent = ready;
            }

            function renderTable() {
                var start = (currentPage - 1) * rowsPerPage;
                var end = Math.min(start + rowsPerPage, filteredData.length);
                var pageItems = filteredData.slice(start, end);

                var tbody = document.getElementById('tableBody');
                var html = '';
                
                if (filteredData.length === 0) {
                    html = `
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 60px 20px; color: #64748b;">
                                <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                                <div style="font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 8px;">Tidak Ada Antrean</div>
                                <div style="font-size: 13px;">Saat ini tidak ada data klaim yang berada dalam status ini.</div>
                            </td>
                        </tr>
                    `;
                } else {
                    for (var i = 0; i < pageItems.length; i++) {
                        var item = pageItems[i];
                        
                        var iconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2"><path d="M19 5H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2z"/><path d="M16 11h4v2h-4z"/></svg>`; 
                        var bgColor = '#F1F5F9';

                        var itemName = item.item ? item.item.toString().toLowerCase() : '';
                        if(itemName.includes('iphone') || itemName.includes('hp')) {
                            iconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#1E4A8A" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><path d="M12 18h.01"/></svg>`;
                            bgColor = '#EFF6FF';
                        } else if(itemName.includes('kunci')) {
                            iconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2"><circle cx="7.5" cy="15.5" r="4.5"/><path d="M21 3l-6 6M17 5l2 2M14 8l2 2"/></svg>`;
                            bgColor = '#F0FDF4';
                        }

                        html += `
                            <tr>
                                <td class="col-id">#CLM-${item.id}</td>
                                <td>
                                    <div class="barang-wrapper">
                                        <div class="icon-container" style="background-color: ${bgColor};">
                                            ${iconSvg}
                                        </div>
                                        <span class="barang-title">${item.item}</span>
                                    </div>
                                </td>
                                <td>${item.claimant}</td>
                                <td>${item.date}</td>
                                <td><span class="badge-status">${item.status.toUpperCase()}</span></td>
                                <td style="text-align: right;">
                                    <a href="cek.html?id=${item.id}" class="btn-check">
                                        <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                        Periksa Berkas
                                    </a>
                                </td>
                            </tr>
                        `;
                    }
                }
                tbody.innerHTML = html;

                var total = filteredData.length;
                var totalPages = Math.ceil(total / rowsPerPage) || 1;
                
                document.getElementById('startEntry').textContent = total === 0 ? 0 : start + 1;
                document.getElementById('endEntry').textContent = total === 0 ? 0 : end;
                document.getElementById('totalEntries').textContent = total;
                document.getElementById('pageNumber').textContent = currentPage;

                document.getElementById('prevPage').disabled = (currentPage === 1);
                document.getElementById('nextPage').disabled = (currentPage === totalPages);

                updateStats();
            }

            
            window.filterTab = function(status) {
                currentTab = status;
                document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
                document.getElementById('tab-' + status).classList.add('active');
                searchData();
            };

            window.searchData = function() {
                var searchInput = document.getElementById('searchInput');
                var keyword = searchInput ? searchInput.value.toLowerCase().trim() : '';
                filteredData = claimData.filter(function(item) {
                    var matchesTab = (item.status === currentTab);
                    var matchesSearch = keyword === '' || 
                        (item.id ? item.id.toString().toLowerCase().includes(keyword) : false) ||
                        (item.item ? item.item.toString().toLowerCase().includes(keyword) : false) ||
                        (item.claimant ? item.claimant.toString().toLowerCase().includes(keyword) : false);
                    return matchesTab && matchesSearch;
                });
                currentPage = 1;
                renderTable();
            };


            document.getElementById('prevPage').addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            });

            document.getElementById('nextPage').addEventListener('click', function() {
                var totalPages = Math.ceil(filteredData.length / rowsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            });

            renderTable();
        })();
    </script>

</body>
</html>
