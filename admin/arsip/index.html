<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsip & Riwayat Laporan - LostFound Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
                   RESET & BASE STYLES
                   ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; color: #1e293b; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; font-family: inherit; border: none; background: none; outline: none; }
        

        /* ============================================================
                   MAIN CONTENT AREA
                   ============================================================ */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; width: calc(100% - 260px); }
        .page-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .page-title-block h1 { font-size: 20px; font-weight: 700; color: #0f172a; letter-spacing: -0.3px; }
        .page-title-block p { font-size: 13px; color: #64748b; margin-top: 4px; }
        .filter-search-group { display: flex; align-items: center; gap: 12px; }
        .status-dropdown { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #334155; font-weight: 500; outline: none; cursor: pointer; min-width: 140px; }
        .search-container { display: flex; align-items: center; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 16px; width: 260px; gap: 10px; }
        .search-container svg { width: 16px; height: 16px; stroke: #94a3b8; stroke-width: 2; fill: none; }
        .search-container input { border: none; outline: none; font-size: 13px; color: #0f172a; width: 100%; }

        /* TABS */
        .tabs-navigation { display: flex; gap: 32px; border-bottom: 1px solid #e2e8f0; margin-bottom: 24px; padding-bottom: 1px; }
        .tab-item { display: flex; align-items: center; gap: 8px; padding: 12px 4px; font-size: 14px; font-weight: 500; color: #64748b; cursor: pointer; position: relative; }
        .tab-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        .tab-item.active { color: #0f172a; font-weight: 700; }
        .tab-item.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: #ea580c; border-radius: 2px; }

        /* CARDS & TABLES */
        .stats-summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
        .summary-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .card-info-side .card-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; display: block; }
        .card-info-side .card-number { font-size: 24px; font-weight: 700; color: #0f172a; }
        .summary-card svg { width: 24px; height: 24px; stroke-width: 2; fill: none; }
        .summary-card.total-arsip svg { stroke: #cbd5e1; }
        .summary-card.diserahkan .card-label { color: #16a34a; }
        .summary-card.diserahkan svg { stroke: #16a34a; }
        .summary-card.gagal .card-label { color: #ef4444; }
        .summary-card.gagal svg { stroke: #ef4444; }
        .summary-card.menunggu .card-label { color: #2563eb; }
        .summary-card.menunggu svg { stroke: #2563eb; }

        .archive-table-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; padding: 16px 24px; border-bottom: 1px solid #f1f5f9; background: #ffffff; }
        td { padding: 18px 24px; font-size: 13px; color: #334155; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .id-cell { color: #64748b; font-weight: 500; }
        .item-cell { font-weight: 700; color: #0f172a; }

        /* BADGES */
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
        .status-badge svg { width: 12px; height: 12px; stroke-width: 2.5; fill: none; }
        .badge-diserahkan { background: #e6f4ea; color: #137333; }
        .badge-diserahkan svg { stroke: #137333; }
        .badge-gagal { background: #f1f3f4; border: 1px solid #e2e8f0; color: #5f6368; }
        .badge-gagal svg { stroke: #5f6368; }
        .badge-menunggu { background: #e8f0fe; color: #1a73e8; }
        .badge-menunggu svg { stroke: #1a73e8; }
        .badge-dibatalkan { background: #fce8e6; color: #c5221f; }
        .badge-dibatalkan svg { stroke: #c5221f; }

        .btn-view-action { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; color: #94a3b8; transition: 0.2s; }
        .btn-view-action:hover { background: #f1f5f9; color: #475569; }
        .btn-view-action svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
    </style>
    <link rel="stylesheet" href="../../assets/css/admin_sidebar.css">
    <link rel="stylesheet" href="../../assets/css/admin_header.css">
</head>
<body>

    <!-- SIDEBAR PANEL -->
    <div id="app-sidebar"></div>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        <div id="app-header" data-title="Arsip Laporan" data-breadcrumb="Arsip > <span>Riwayat Laporan</span>"></div>

        <nav class="tabs-navigation">
            <div class="tab-item active" id="tab-barang" onclick="switchTab('barang')">
                <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                Arsip Barang Temuan
            </div>
            <div class="tab-item" id="tab-klaim" onclick="switchTab('klaim')">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Arsip Klaim
            </div>
        </nav>

        <section class="stats-summary-grid">
            <div class="summary-card total-arsip">
                <div class="card-info-side">
                    <span class="card-label">Total Arsip</span>
                    <div class="card-number" id="stat-total">...</div>
                </div>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            </div>

            <div class="summary-card diserahkan">
                <div class="card-info-side">
                    <span class="card-label">Diserahkan</span>
                    <div class="card-number" id="stat-diserahkan">...</div>
                </div>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#16a34a" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="16 9 11 14 8 11"></polyline></svg>
            </div>

            <div class="summary-card gagal">
                <div class="card-info-side">
                    <span class="card-label">Gagal / Batal</span>
                    <div class="card-number" id="stat-batal">...</div>
                </div>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line></svg>
            </div>

            <div class="summary-card menunggu">
                <div class="card-info-side">
                    <span class="card-label">Menunggu</span>
                    <div class="card-number" id="stat-menunggu">...</div>
                </div>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#2563eb" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
        </section>

        <section class="archive-table-card">
            <table>
                <thead>
                    <tr>
                        <th>ID REKAM</th>
                        <th>ITEM</th>
                        <th>PENGKLAIM</th>
                        <th>WAKTU LOG</th>
                        <th>STATUS</th>
                        <th>AKSI</th>
                    </tr>
                </thead>
                <tbody id="archiveTableBody">
                        <tr><td colspan="6" style="text-align: center; padding: 20px; color: #64748b;">Memuat data arsip...</td></tr>
                    </tbody>
            </table>
        </section>
    </main>


    <!-- Injected Base Scripts -->
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/components.js"></script>

    <script>
        let currentTab = 'barang';

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            if (tab === 'barang') {
                document.querySelector('.summary-card.diserahkan .card-label').innerText = 'Dipublikasi';
                document.querySelector('.summary-card.gagal .card-label').innerText = 'Ditolak';
                document.querySelector('.summary-card.menunggu .card-label').innerText = 'Menunggu';
            } else {
                document.querySelector('.summary-card.diserahkan .card-label').innerText = 'Diserahkan';
                document.querySelector('.summary-card.gagal .card-label').innerText = 'Ditolak / Batal';
                document.querySelector('.summary-card.menunggu .card-label').innerText = 'Menunggu';
            }
            
            loadData();
        };

        async function loadData() {
            const tbody = document.getElementById('archiveTableBody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px; color: #64748b;">Memuat data arsip...</td></tr>';
            
            try {
                const endpoint = currentTab === 'barang' ? '/admin/items' : '/claims';
                const result = await window.apiFetch(endpoint);
                
                if (result.response.ok) {
                    let dataList = [];
                    if (Array.isArray(result.data)) dataList = result.data;
                    else if (result.data && Array.isArray(result.data.data)) dataList = result.data.data;
                    else if (result.data && result.data.data && Array.isArray(result.data.data.data)) dataList = result.data.data.data;
                    
                    let sukses = 0, gagal = 0, tunggu = 0;
                    let html = '';

                    dataList.forEach(c => {
                        let statusVal = currentTab === 'barang' ? c.status : c.status_verif;
                        
                        if (currentTab === 'barang') {
                            if (c.visibility === 'public') sukses++;
                            else if (statusVal === 'rejected') gagal++;
                            else tunggu++;
                        } else {
                            if (statusVal === 'returned') sukses++;
                            else if (statusVal === 'rejected') gagal++;
                            else tunggu++;
                        }

                        let badge = '';
                        if (currentTab === 'barang' && c.visibility === 'public') {
                            badge = `<span class="status-badge badge-diserahkan"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg> Dipublikasi</span>`;
                        } else if (currentTab === 'klaim' && statusVal === 'returned') {
                            badge = `<span class="status-badge badge-diserahkan"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg> Diserahkan</span>`;
                        } else if (statusVal === 'rejected') {
                            badge = `<span class="status-badge badge-dibatalkan"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line></svg> Ditolak</span>`;
                        } else {
                            badge = `<span class="status-badge badge-menunggu"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Menunggu</span>`;
                        }

                        let dateStr = new Date(c.created_at || c.tanggal_lapor).toLocaleString('id-ID', {day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit'});
                        let title = currentTab === 'barang' ? c.judul : (c.item ? c.item.judul : 'Barang');
                        let user = c.user ? c.user.nama_lengkap : 'Anonim';
                        let idPrefix = currentTab === 'barang' ? 'ITM' : 'CLM';
                        let linkUrl = currentTab === 'barang' ? `detail.html?id=${c.id}&type=barang` : `detail.html?id=${c.id}&type=klaim`;

                        html += `<tr>
                            <td class="id-cell">#${idPrefix}-${c.id}</td>
                            <td class="item-cell">${title}</td>
                            <td>${user}</td>
                            <td>${dateStr}</td>
                            <td>${badge}</td>
                            <td>
                                <a href="${linkUrl}" class="btn-view-action" style="text-decoration: none; display:inline-flex; align-items:center; justify-content:center;"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></a>
                            </td>
                        </tr>`;
                    });

                    if (html === '') {
                        html = `<tr><td colspan="6" style="text-align: center; padding: 60px 20px; color: #64748b;">
                            <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                            <div style="font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 8px;">Arsip Kosong</div>
                            <div style="font-size: 13px;">Belum ada riwayat pada kategori ini.</div>
                        </td></tr>`;
                    }
                    tbody.innerHTML = html;

                    if(document.getElementById('stat-total')) document.getElementById('stat-total').innerText = dataList.length;
                    if(document.getElementById('stat-diserahkan')) document.getElementById('stat-diserahkan').innerText = sukses;
                    if(document.getElementById('stat-batal')) document.getElementById('stat-batal').innerText = gagal;
                    if(document.getElementById('stat-menunggu')) document.getElementById('stat-menunggu').innerText = tunggu;
                }
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px; color: #dc2626;">Terjadi kesalahan saat memuat arsip.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            switchTab('barang');
        });
    </script>
</body>
</html>
