<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyerahan Fisik Barang - Lost & Found Admin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/admin_sidebar.css">
    <link rel="stylesheet" href="../../assets/css/admin_header.css">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            margin: 0;
            display: flex;
        }
        .font-headline {
            font-family: 'Hanken Grotesk', sans-serif;
        }
        /* Reset Tailwind overrides for main container */
        .main-content {
            margin-left: 260px;
            padding: 32px 48px;
            width: calc(100% - 260px);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .webcam-container {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="text-[#131b2e]">

    <!-- SIDEBAR LEFT -->
    <div id="app-sidebar"></div>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        
        <!-- TOPBAR -->
        <div id="app-header" data-title="Serah Terima" data-breadcrumb="Dashboard > <span>Serah Terima Fisik</span>"></div>

        <!-- Batal & Kembali Button -->
        <button onclick="window.location.href='../dashboard/index.html'" class="group flex items-center gap-2 mb-8 mt-4 text-[#57657a] hover:text-[#a33900] transition-colors font-semibold text-sm">
            <span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1">arrow_back</span>
            Batal & Kembali ke Dashboard
        </button>

        <!-- Verification Card -->
        <div class="bg-white rounded-xl shadow-sm p-8 border border-slate-100 animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-2xl mx-auto w-full">
            
            <!-- Card Header Section -->
            <div class="space-y-4 mb-8">
                <h1 class="text-2xl font-bold font-headline leading-tight">
                    Proses Penyerahan Langsung: <span class="text-[#a33900]" id="uiItemName">Memuat Data...</span>
                </h1>
                <div class="flex flex-wrap items-center gap-3">
                    <span class="inline-flex items-center px-4 py-1.5 rounded-full bg-[#10B981] text-white font-bold text-sm">
                        Status: Lolos Verifikasi Bukti Kuat
                    </span>
                    <span class="text-[#5a4138] text-sm italic">
                        Data ditarik berdasarkan validasi Token: <span class="font-bold text-[#a33900]" id="uiTokenString">...</span>
                    </span>
                </div>
            </div>

            <!-- Webcam Feature Section -->
            <div class="space-y-4 mb-8">
                <div class="relative aspect-video rounded-xl overflow-hidden webcam-container shadow-inner border border-slate-700 bg-black flex items-center justify-center" id="cameraContainer">
                    <video id="webcamVideo" autoplay playsinline class="w-full h-full object-cover" style="display:none;"></video>
                    <canvas id="webcamCanvas" class="w-full h-full object-cover" style="display:none;"></canvas>
                    <div id="cameraPlaceholder" class="text-slate-400 flex flex-col items-center">
                        <span class="material-symbols-outlined text-4xl mb-2">videocam_off</span>
                        <span class="text-sm">Kamera Belum Aktif</span>
                    </div>
                    
                    <!-- Webcam Overlays -->
                    <div id="recIndicator" class="absolute top-4 left-4 flex items-center gap-2 px-3 py-1 bg-black/40 backdrop-blur-md rounded-full border border-white/20" style="display:none;">
                        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                        <span class="text-[10px] font-bold text-white uppercase tracking-widest">REC - WEBCAM 01</span>
                    </div>
                    <div class="absolute bottom-4 right-4 text-white/50 text-[10px] font-mono" id="uiTimestamp">
                        TIMESTAMP: ...
                    </div>
                </div>
                <div class="flex justify-center gap-4">
                    <button id="btnStartCamera" class="flex items-center gap-2 px-4 py-2 text-[#a33900] hover:bg-[#ffdbce] rounded-lg transition-all font-semibold text-sm border border-dashed border-[#a33900]/30">
                        <span class="material-symbols-outlined text-lg">videocam</span>
                        Aktifkan Kamera
                    </button>
                    <button id="btnCapturePhoto" class="flex items-center gap-2 px-4 py-2 bg-[#a33900] text-white hover:bg-[#7f2b00] rounded-lg transition-all font-semibold text-sm" style="display:none;">
                        <span class="material-symbols-outlined text-lg">camera_alt</span>
                        <span id="captureBtnText">Ambil Foto Penerima</span>
                    </button>
                </div>
            </div>

            <!-- Checklist Section -->
            <div class="space-y-4 mb-10">
                <label class="flex items-start gap-4 p-4 rounded-xl border border-slate-100 hover:border-[#cc4900] hover:bg-orange-50/30 transition-all cursor-pointer group">
                    <input type="checkbox" class="mt-1 w-5 h-5 rounded border-slate-300 text-[#10B981] focus:ring-[#10B981] transition-all">
                    <span class="text-base text-[#5a4138] group-hover:text-[#131b2e]">
                        Saya mengonfirmasi telah memeriksa identitas KTP/KTM asli milik pengklaim secara langsung dan data identitas cocok.
                    </span>
                </label>
                <label class="flex items-start gap-4 p-4 rounded-xl border border-slate-100 hover:border-[#cc4900] hover:bg-orange-50/30 transition-all cursor-pointer group">
                    <input type="checkbox" class="mt-1 w-5 h-5 rounded border-slate-300 text-[#10B981] focus:ring-[#10B981] transition-all">
                    <span class="text-base text-[#5a4138] group-hover:text-[#131b2e]">
                        Saya mengonfirmasi fisik barang telah diserahkan sepenuhnya kepada pemilik yang sah dan foto dokumentasi serah terima telah disimpan sistem.
                    </span>
                </label>
            </div>

            <!-- Final Action Button -->
            <button id="finishButton" disabled class="w-full flex items-center justify-center gap-3 py-5 bg-[#10B981] text-white font-bold text-xl rounded-xl shadow-lg shadow-emerald-200 hover:bg-emerald-600 hover:-translate-y-0.5 active:translate-y-0 transition-all disabled:opacity-50 disabled:grayscale disabled:pointer-events-none">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">task_alt</span>
                Selesaikan Serah Terima & Tutup Laporan
            </button>

        </div>
    </main>

    <!-- Scripts -->
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/admin_serah_terima.js"></script>
</body>
</html>
