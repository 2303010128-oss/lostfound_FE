<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8" />
    <title>Detail Postingan - LostFound Connect</title>
    <!-- Include Google Fonts for Inter and Hanken Grotesk if needed, we'll use Inter as fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; min-height: 100vh; }
        
        .container { max-width: 1240px; margin: 0 auto; padding: 0 24px; width: 100%; box-sizing: border-box; }

        .detail-postingan {
            background: linear-gradient(0deg, rgba(248, 250, 252, 1) 0%, rgba(248, 250, 252, 1) 100%),
                        linear-gradient(0deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 1) 100%);
            width: 100%; flex: 1; display: flex; flex-direction: column;
        }

        /* Main Content */
        .main { display: flex; flex-direction: column; max-width: 1240px; width: 100%; align-items: flex-start; gap: 24px; padding: 24px; margin: 0 auto; flex: 1; box-sizing: border-box; }
        .div-2 { display: flex; align-items: center; gap: 8px; width: 100%; }
        .text-4 { font-family: "Inter", sans-serif; font-weight: 600; color: #5a4138; font-size: 14px; }
        .img { width: 4px; height: 7px; background: #94a3b8; clip-path: polygon(0 0, 100% 50%, 0 100%); margin: 0 4px; }
        
        .content-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; width: 100%; }
        .left-column-image { grid-column: 1 / 8; width: 100%; height: 500px; object-fit: contain; border-radius: 12px; background: #e2e8f0; }
        .right-column-details { grid-column: 8 / 13; width: 100%; display: flex; flex-direction: column; gap: 24px; }

        /* Right Column Blocks */
        .background-border { display: flex; flex-direction: column; gap: 8px; padding: 24px; background-color: #ffffff; border-radius: 12px; border: 1px solid #f1f5f9; box-shadow: 0px 1px 2px #0000000d; }
        .container-4 { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .background { padding: 4px 12px; background-color: #f43f5e; border-radius: 9999px; }
        .background.found { background-color: #10b981; }
        .text-5 { font-family: "Inter", sans-serif; font-weight: 600; color: #ffffff; font-size: 12px; letter-spacing: 0.6px; }
        .button-2 { display: flex; gap: 4px; padding: 4px 8px; border-radius: 4px; align-items: center; background: none; border: none; cursor: pointer; }
        .text-6 { font-family: "Inter", sans-serif; font-weight: 500; color: #a33900; font-size: 12px; }
        
        .heading { display: flex; flex-direction: column; padding: 8px 0px 0px; width: 100%; }
        .laptop-macbook-pro { font-family: "Hanken Grotesk", sans-serif; font-weight: 700; color: #131b2e; font-size: 32px; line-height: 40px; }
        .div-wrapper { padding: 0px 0px 16px; width: 100%; }
        .p { font-family: "Inter", sans-serif; font-weight: 400; color: #5a4138; font-size: 14px; }

        .reporter-card { display: flex; align-items: center; gap: 16px; padding: 16px; background-color: #f2f3ff; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .background-2 { display: flex; width: 48px; height: 48px; align-items: center; justify-content: center; background-color: #a33900; border-radius: 9999px; }
        .text-7 { font-family: "Inter", sans-serif; font-weight: 600; color: #ffffff; font-size: 20px; }
        .div-3 { display: flex; flex-direction: column; }
        .text-8 { font-family: "Inter", sans-serif; font-weight: 400; color: #5a4138; font-size: 14px; }

        .description { display: flex; flex-direction: column; gap: 24px; padding: 24px 0px; width: 100%; }
        .section { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .laptop-tertinggal-di { font-family: "Inter", sans-serif; font-weight: 400; color: #5a4138; font-size: 16px; line-height: 26px; }
        
        .container-6 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .section-2, .section-3 { display: flex; flex-direction: column; gap: 4px; padding: 12px; background-color: #ffffff; border-radius: 8px; border: 1px solid #f1f5f9; box-sizing: border-box; }
        .text-wrapper-2 { font-family: "Inter", sans-serif; font-weight: 500; color: #5a4138; font-size: 12px; }
        .text-wrapper-3 { font-family: "Inter", sans-serif; font-weight: 400; color: #131b2e; font-size: 16px; }
        .text-wrapper-4 { font-family: "Inter", sans-serif; font-weight: 600; color: #131b2e; font-size: 14px; }
        
        .list { display: flex; flex-direction: column; gap: 8px; padding-left: 20px; width: 100%; }
        .text-9 { font-family: "Inter", sans-serif; font-weight: 400; color: #5a4138; font-size: 14px; line-height: 20px; }

        .CTA-action { display: flex; flex-direction: column; gap: 16px; padding: 32px 0px 0px; width: 100%; border-top: 1px solid #f1f5f9; }
        .button-3 { display: flex; justify-content: center; gap: 8px; padding: 16px 0px; width: 100%; background-color: #a33900; border-radius: 8px; align-items: center; border: none; cursor: pointer; transition: background 0.2s; }
        .button-3:hover { background-color: #872f00; }
        .text-11 { font-family: "Inter", sans-serif; font-weight: 400; color: #ffffff; font-size: 16px; }
        .container-7 { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .text-12 { font-family: "Inter", sans-serif; font-weight: 500; color: #5a4138; font-size: 12px; }

        .security-tip-card { display: flex; align-items: flex-start; gap: 12px; padding: 16px; background-color: #eaedff; border-radius: 12px; border: 1px solid #dae2fd; margin-top: 24px; box-sizing: border-box;}
        .text-13 { font-family: "Inter", sans-serif; font-weight: 400; color: #5a4138; font-size: 14px; line-height: 20px; }

        /* Responsiveness */
        @media (max-width: 1024px) {
            .content-grid { display: flex; flex-direction: column; }
            .left-column-image { width: 100%; height: auto; aspect-ratio: 4/3; }
        }
    </style>
</head>
<body>
    
    <!-- Generic Navbar (Loaded via JS) -->
    <div id="app-navbar"></div>

    <div class="detail-postingan">
        <!-- Main -->
        <div class="main">
            <!-- Breadcrumb -->
            <div class="div-2">
                <a href="../mading/index.html" class="text-4" style="text-decoration:none;">Beranda</a>
                <div class="img"></div>
                <div class="text-2">Detail Postingan</div>
            </div>

            <div class="content-grid">
                <img class="left-column-image" id="itemImg" src="" alt="Foto Barang" />
                
                <div class="right-column-details">
                    <div class="background-border">
                        <div class="container-4">
                            <div class="background" id="postTypeBadge"><div class="text-5" id="postTypeTxt"></div></div>
                            <button class="button-2">
                                <div class="text-6">Bagikan</div>
                            </button>
                        </div>
                        
                        <div class="heading">
                            <div class="laptop-macbook-pro" id="itemTitle"></div>
                        </div>
                        
                        <div class="div-wrapper">
                            <p class="p" id="itemDate"></p>
                        </div>
                        
                        <div class="reporter-card">
                            <div class="background-2"><div class="text-7" id="authorInitials"></div></div>
                            <div class="div-3">
                                <div class="text-2" id="authorName"></div>
                                <div class="text-8" id="authorRole"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="description">
                        <div class="section">
                            <div class="div-2">
                                <div class="text-2">Lokasi Terakhir / Ditemukan</div>
                            </div>
                            <div class="div-3">
                                <p class="laptop-tertinggal-di" id="itemLocation"></p>
                            </div>
                        </div>
                        
                        <div class="container-6">
                            <div class="section-2">
                                <div class="text-wrapper-2">Kategori</div>
                                <div class="text-wrapper-3" id="itemCategory"></div>
                            </div>
                            <div class="section-3">
                                <div class="text-wrapper-2">Status</div>
                                <div class="text-wrapper-3" id="itemStatus"></div>
                            </div>
                        </div>
                        
                        <div class="section">
                            <div class="text-wrapper-4">Deskripsi Umum</div>
                            <div class="div-3">
                                <p class="text-9" id="itemDesc"></p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="CTA-action">
                        <button class="button-3" id="mainActionButton" onclick="handleActionClick()">
                            <div class="text-11" id="actionBtnTxt"></div>
                        </button>
                        <div class="container-7">
                            <p class="text-12" id="actionHintTxt">Pemberitahuan akan dikirimkan ke pemilik postingan.</p>
                        </div>
                    </div>
                    
                    <div class="security-tip-card">
                        <div class="div-3" style="width: auto; font-size:20px;">💡</div>
                        <div class="div-3">
                            <div class="text-2">Tips Keamanan</div>
                            <p class="text-13">Pastikan melakukan serah terima di area publik kampus atau melalui petugas keamanan gedung.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Generic Footer (Loaded via JS) -->
    <div id="app-footer"></div>

    <!-- API Integration Script -->
    <script>
        const API_URL = `http://${window.location.hostname}:8000/api/v1`;
        let currentItem = null;

        function getAuthToken() {
            return localStorage.getItem('token');
        }

        function getImageUrl(path) {
            return path ? `http://${window.location.hostname}:8000/storage/${path}` : '../../assets/img/default-item.png';
        }

        async function fetchItemDetails() {
            const urlQuery = new URLSearchParams(window.location.search);
            const itemId = urlQuery.get('id');
            if (!itemId) {
                alert('Item ID tidak ditemukan.');
                window.location.href = '../mading/index.html';
                return;
            }

            try {
                const headers = {};
                const token = getAuthToken();
                if (token) headers['Authorization'] = 'Bearer ' + token;

                const res = await fetch(`${API_URL}/items/${itemId}`, { headers: headers });
                const resData = await res.json();

                if (resData.success && resData.data) {
                    currentItem = resData.data;
                    renderItemDetails(currentItem);
                } else {
                    alert('Data barang tidak ditemukan.');
                    window.location.href = '../mading/index.html';
                }
            } catch (err) {
                console.error("Gagal memuat detail barang:", err);
                alert('Gagal mengambil data dari server.');
            }
        }

        function renderItemDetails(item) {
            // Judul & Gambar
            document.getElementById('itemTitle').textContent = item.judul;
            document.getElementById('itemImg').src = getImageUrl(item.foto);

            // Waktu & Lokasi
            const tgl = new Date(item.tanggal_lapor).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('itemDate').textContent = `Diposting pada ${tgl}`;
            document.getElementById('itemLocation').textContent = item.location ? item.location.nama_tempat : 'Area Kampus';

            // Badge Tipe & Kategori
            const isLost = item.post_type === 'lost';
            const badge = document.getElementById('postTypeBadge');
            const badgeTxt = document.getElementById('postTypeTxt');
            
            if (isLost) {
                badge.className = 'background'; // red
                badgeTxt.textContent = 'KEHILANGAN';
            } else {
                badge.className = 'background found'; // green
                badgeTxt.textContent = 'DITEMUKAN';
            }

            document.getElementById('itemCategory').textContent = item.category ? item.category.nama_kategori : '-';
            document.getElementById('itemStatus').textContent = item.status === 'active' ? 'Aktif' : 'Selesai';
            
            // Deskripsi
            document.getElementById('itemDesc').textContent = item.deskripsi;

            // Penulis
            const authorName = item.user ? item.user.nama_lengkap : 'Pengguna';
            document.getElementById('authorName').textContent = authorName;
            document.getElementById('authorInitials').textContent = authorName.substring(0, 2).toUpperCase();
            document.getElementById('authorRole').textContent = isLost ? 'Pelapor' : 'Penemu';

            // Konfigurasi Tombol
            const btnTxt = document.getElementById('actionBtnTxt');
            const hintTxt = document.getElementById('actionHintTxt');
            
            if (isLost) {
                btnTxt.textContent = "🤝 Saya Menemukan Ini";
                hintTxt.textContent = "Arahkan ke Lapor Temuan untuk menghubungkan data.";
            } else {
                btnTxt.textContent = "🙋 Ini Barang Saya (Ajukan Klaim)";
                hintTxt.textContent = "Anda akan diarahkan untuk mengisi form klaim & unggah bukti.";
            }
        }

        window.handleActionClick = function() {
            if (!currentItem) return;
            const isLost = currentItem.post_type === 'lost';
            if (isLost) {
                window.location.href = `../lapor-temuan/index.html?match_lost_id=${currentItem.id}`;
            } else {
                window.location.href = `../lapor-hilang/index.html?id=${currentItem.id}`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchItemDetails();
        });
    </script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/components_user.js"></script>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
