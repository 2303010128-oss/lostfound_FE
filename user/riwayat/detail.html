            },
            "fontFamily": {
                "headline-lg": ["Hanken Grotesk"], "label-md": ["Inter"], "body-md": ["Inter"], "body-sm": ["Inter"], "body-lg": ["Inter"], "label-sm": ["Inter"], "headline-sm": ["Hanken Grotesk"], "headline-md": ["Hanken Grotesk"]
            }
        }
    }
}

<style>

<body class="bg-surface-main text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Bar -->

<div class="flex justify-between items-center w-full px-4 md:px-8 max-w-[1280px] mx-auto h-16">
<div class="flex items-center gap-4">
    <button class="md:hidden flex items-center justify-center p-2 text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors">
        <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="text-[20px] font-bold font-headline-lg text-primary dark:text-primary-fixed-dim">LostFound Connect</span>
</div>
<nav class="hidden md:flex items-center gap-6">
    <a class="text-on-surface-variant hover:text-primary transition-colors" href="../mading/index.html">Beranda</a>

    <a class="text-on-surface-variant hover:text-primary transition-colors" href="../bantuan/index.html">Pusat Bantuan</a>
</nav>
<div class="flex items-center gap-4">
    <button class="relative p-2 text-secondary hover:text-primary transition-colors">
        <span class="material-symbols-outlined">notifications</span>
    </button>
    <div class="flex items-center gap-2 border-l border-surface-container-high pl-4">
        <div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm" id="headerAvatar">US</div>
        <span class="hidden sm:block text-on-surface font-semibold text-sm truncate max-w-[100px]" id="headerName">User</span>
    </div>
</div>
</div>

<div class="flex min-h-screen pt-16 max-w-[1280px] mx-auto w-full flex-1">
<!-- Sidebar -->
<aside class="hidden md:flex flex-col w-64 shrink-0 gap-2 py-6 h-[calc(100vh-64px)] sticky top-16 border-r border-surface-container-low">
    <a class="mx-2 px-4 py-3 rounded-lg text-secondary hover:bg-surface-container-low transition-colors font-semibold text-sm flex items-center gap-3" href="../ringkasan/index.html"><span class="material-symbols-outlined">dashboard</span>Ringkasan</a>
    <a class="mx-2 px-4 py-3 rounded-lg text-secondary hover:bg-surface-container-low transition-colors font-semibold text-sm flex items-center gap-3" href="../klaim/index.html"><span class="material-symbols-outlined">assignment</span>Klaim Saya</a>
    <a class="mx-2 px-4 py-3 rounded-lg bg-surface-container-high text-primary font-bold transition-colors font-semibold text-sm flex items-center gap-3" href="../riwayat/index.html"><span class="material-symbols-outlined">history</span>Riwayat</a>
    <div class="mt-auto pt-4 border-t border-surface-container-low">
        <a class="mx-2 px-4 py-3 rounded-lg text-secondary hover:bg-surface-container-low transition-colors font-semibold text-sm flex items-center gap-3" href="../profil/index.html"><span class="material-symbols-outlined">settings</span>Pengaturan</a>
        <a class="mx-2 px-4 py-3 rounded-lg text-error hover:bg-error-container/20 transition-colors font-semibold text-sm flex items-center gap-3 mt-1" href="javascript:void(0)" onclick="logout()"><span class="material-symbols-outlined">logout</span>Keluar</a>
    </div>
</aside>

<!-- Main Content -->
<main class="flex-1 p-4 md:p-8">
<div class="max-w-[1000px] mx-auto w-full" id="contentArea">
    <div class="text-center py-20 text-secondary">Memuat data detail...</div>
</div>
</main>
</div>

<!-- Mobile Nav -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-surface border-t border-slate-100 flex justify-around items-center z-50">
<button onclick="window.location.href='../ringkasan/index.html'" class="flex flex-col items-center gap-1 text-secondary">
    <span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-medium">Home</span>
</button>
<button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1 text-primary">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history</span><span class="text-[10px] font-medium">Riwayat</span>
</button>
<button onclick="window.location.href='../mading/index.html'" class="flex flex-col items-center gap-1 text-secondary">
    <span class="material-symbols-outlined">add_circle</span><span class="text-[10px] font-medium">Mading</span>
</button>
<button onclick="window.location.href='../profil/index.html'" class="flex flex-col items-center gap-1 text-secondary">
    <span class="material-symbols-outlined">account_circle</span><span class="text-[10px] font-medium">Profil</span>
</button>
</nav>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (!localStorage.getItem('token')) {
            window.location.href = '../auth/login.html';
            return;
        }

        const userData = localStorage.getItem('user');
        if (userData) {
            try {
                const user = JSON.parse(userData);
                document.getElementById('headerName').innerText = user.nama_lengkap;
                document.getElementById('headerAvatar').innerText = user.nama_lengkap.substring(0, 2).toUpperCase();
            } catch(e){}
        }

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const id = urlParams.get('id');

        if (!id || !type) {
            document.getElementById('contentArea').innerHTML = '<div class="text-center py-20 text-error">Data tidak valid.</div>';
            return;
        }

        try {
            let endpoint = '';
            if (type === 'claim') {
                endpoint = '/claims/' + id;
            } else {
                endpoint = '/items/' + id;
            }

            const res = await window.apiFetch(endpoint);
            if (res.response.ok && res.data && res.data.success) {
                renderDetail(res.data.data, type);
            } else {
                document.getElementById('contentArea').innerHTML = '<div class="text-center py-20 text-error">Gagal mengambil detail.</div>';
            }
        } catch (e) {
            console.error(e);
            document.getElementById('contentArea').innerHTML = '<div class="text-center py-20 text-error">Terjadi kesalahan jaringan.</div>';
        }
    });

    function renderDetail(data, type) {
        const item = type === 'claim' ? (data.item || {}) : data;
        const postType = item.post_type || 'lost'; // lost or found
        const isOwnerFound = (type === 'claim' && postType === 'found') || (type === 'item' && postType === 'lost');
        
        // Setup Badge & Text
        const pageTitle = postType === 'lost' ? 'Detail Riwayat Kehilangan' : 'Detail Riwayat Penemuan';
        const badgeColor = postType === 'lost' ? 'bg-status-found-bg text-status-found-text' : 'bg-status-found-bg text-status-found-text';
        const badgeLabel = postType === 'lost' ? 'Selesai / Dikembalikan' : 'Berhasil Diambil Pemilik';
        
        let imgUrl = item.foto;
        if (imgUrl && !imgUrl.startsWith('http')) {
            imgUrl = `http://${window.location.hostname}:8000/storage/` + imgUrl;
        }
        if (!imgUrl) {
            imgUrl = 'data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22600%22%20height%3D%22400%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20600%20400%22%20preserveAspectRatio%3D%22none%22%3E%3Cdefs%3E%3Cstyle%20type%3D%22text%2Fcss%22%3E%23holder_1%20text%20%7B%20fill%3A%23999%3Bfont-weight%3Anormal%3Bfont-family%3AHelvetica%2C%20monospace%3Bfont-size%3A30pt%20%7D%20%3C%2Fstyle%3E%3C%2Fdefs%3E%3Cg%20id%3D%22holder_1%22%3E%3Crect%20width%3D%22600%22%20height%3D%22400%22%20fill%3D%22%23eee%22%3E%3C%2Frect%3E%3Cg%3E%3Ctext%20x%3D%22204.5%22%20y%3D%22212.5%22%3ETidak%20Ada%20Foto%3C%2Ftext%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E';
        }

        const dateObj = new Date(item.created_at);
        const dateStr = dateObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' WIB';
        const locationName = (item.location && item.location.nama_tempat) ? item.location.nama_tempat : '-';

        // Extract Timeline Logs
        let logs = [];
        if (type === 'claim' && data.item && data.item.activity_logs) {
            logs = [...logs, ...data.item.activity_logs];
        }
        if (data.activity_logs) {
            logs = [...logs, ...data.activity_logs];
        }
        // Remove duplicates if any (though shouldn't be) and sort
        logs.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        
        let timelineHtml = '';
        logs.forEach((log, index) => {
            const isLast = index === logs.length - 1;
            const logDate = new Date(log.created_at).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            
            let iconColor = 'bg-slate-100 border-white';
            let innerDot = '';
            
            if (isLast && log.action_type === 'handover') {
                iconColor = 'bg-status-found-bg border-white';
                innerDot = '<span class="material-symbols-outlined text-white text-[14px]">check</span>';
            } else if (log.action_type === 'created') {
                iconColor = 'bg-white border-primary';
                innerDot = '<div class="w-2 h-2 bg-primary rounded-full"></div>';
            } else if (log.action_type === 'status_changed') {
                if (log.metadata && log.metadata.status === 'clarification_required') {
                    iconColor = 'bg-status-warning-bg border-white';
                } else if (log.metadata && log.metadata.status === 'rejected') {
                    iconColor = 'bg-status-lost-bg border-white';
                } else {
                    iconColor = 'bg-white border-primary';
                    innerDot = '<div class="w-2 h-2 bg-primary rounded-full"></div>';
                }
            }

            timelineHtml += `
            <div class="relative pl-10">
                <div class="absolute left-0 top-1 w-6 h-6 rounded-full ${iconColor} border-2 flex items-center justify-center z-10 shadow-sm">
                    ${innerDot}
                </div>
                <div class="space-y-1">
                    <span class="text-[12px] font-medium text-secondary">${logDate}</span>
                    <p class="text-[14px] font-medium text-on-surface">${log.description}</p>
                </div>
            </div>
            `;
        });
        
        if (logs.length === 0) {
            timelineHtml = '<div class="pl-4 text-sm text-secondary">Belum ada riwayat aktivitas yang tercatat.</div>';
        }

        let extraSection = '';
        if (postType === 'lost') {
            extraSection = `
            <div class="flex gap-4 mt-6">
                <button class="flex-1 bg-primary text-on-primary font-semibold text-[14px] py-3 rounded-lg hover:bg-primary-container transition-colors shadow-soft" onclick="alert('Fitur unduh dalam pengembangan.')">
                    Unduh Salinan Surat Pernyataan (.PDF)
                </button>
            </div>
            `;
        } else {
            extraSection = `
            <section class="bg-primary-container/10 border border-outline-variant rounded-xl p-5 flex items-center gap-4 relative overflow-hidden mt-6">
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-primary"></div>
                <div class="flex-shrink-0 w-12 h-12 bg-primary rounded-full flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">military_tech</span>
                </div>
                <div class="flex-1">
                    <p class="text-[14px] text-on-surface">
                        <span class="font-bold">Penghargaan Kejujuran:</span> Terima kasih! Berkat kejujuran Anda, barang berharga ini telah kembali ke tangan pemiliknya yang sah dengan aman.
                    </p>
                </div>
            </section>
            `;
        }

        const html = `
        <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-on-secondary-container hover:text-primary transition-colors mb-6 group">
            <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
            <span class="font-semibold text-sm">Kembali ke Riwayat</span>
        </button>

        <header class="mb-10">
            <h1 class="font-bold text-[32px] text-on-surface mb-2">${pageTitle}</h1>
            <p class="text-[16px] text-on-surface-variant max-w-2xl">Arsip resmi pelaporan dan serah terima pengembalian barang berharga Anda.</p>
        </header>

        <div class="space-y-8 relative z-10">
            <!-- Item Summary Card -->
            <div class="bg-surface-card rounded-xl shadow-soft p-6 border border-slate-100">
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="w-full md:w-64 h-64 rounded-lg overflow-hidden shrink-0 bg-slate-50 border border-slate-100">
                        <img alt="${item.judul}" class="w-full h-full object-cover" src="${imgUrl}">
                    </div>
                    <div class="flex-1 flex flex-col justify-between py-2">
                        <div>
                            <div class="flex flex-col md:flex-row justify-between items-start mb-4 gap-4">
                                <div>
                                    <h2 class="font-semibold text-[24px] text-on-surface mb-1">${item.judul}</h2>
                                    <p class="text-[14px] text-secondary font-semibold">ID #${type === 'claim' ? 'CLM-'+data.id : 'ITM-'+data.id}</p>
                                </div>
                                <span class="${badgeColor}/10 ${badgeColor.replace('bg-', 'text-')} px-4 py-1.5 rounded-full text-[14px] font-semibold flex items-center gap-2 border border-${badgeColor.replace('bg-', '')}/20">
                                    <span class="w-2 h-2 rounded-full ${badgeColor.split(' ')[0]}"></span>
                                    ${badgeLabel}
                                </span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                                <div class="p-3 bg-surface-container rounded-lg">
                                    <p class="text-[12px] font-medium text-secondary mb-1">Lokasi ${postType === 'lost' ? 'Terakhir' : 'Ditemukan'}</p>
                                    <p class="text-[14px] font-semibold text-on-surface">${locationName}</p>
                                </div>
                                <div class="p-3 bg-surface-container rounded-lg">
                                    <p class="text-[12px] font-medium text-secondary mb-1">Waktu Lapor</p>
                                    <p class="text-[14px] font-semibold text-on-surface">${dateStr}</p>
                                </div>
                            </div>
                        </div>
                        ${postType === 'lost' ? extraSection : ''}
                    </div>
                </div>
            </div>

            ${postType === 'found' ? extraSection : ''}

            <!-- Timeline Section -->
            <section class="bg-white rounded-xl shadow-soft p-8 border border-slate-100">
                <h3 class="font-semibold text-[20px] text-on-surface mb-8 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">analytics</span> Log Rekam Jejak
                </h3>
                <div class="relative space-y-10 before:absolute before:left-[11px] before:top-2 before:bottom-2 before:w-[2px] before:bg-slate-100 ml-4">
                    ${timelineHtml}
                </div>
            </section>

            <!-- Legal Archive Notice -->
            <div class="bg-surface-container-high/50 border border-surface-container-highest rounded-xl p-6 flex items-start gap-4">
                <span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
                <div>
                    <h4 class="font-semibold text-[14px] text-on-surface mb-1">Informasi Pengarsipan Digital</h4>
                    <p class="text-[14px] text-on-surface-variant leading-relaxed">
                        Data ini telah diarsipkan secara digital ke dalam sistem pusat LostFound Connect. Dokumen ini sah dan tidak dapat diubah lagi.
                    </p>
                </div>
            </div>
        </div>
        `;
        document.getElementById('contentArea').innerHTML = html;
    }
</script>
</body></html>
